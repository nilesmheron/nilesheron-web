<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tech-Based Programs - Program Pipeline</title>
<style>
:root{
  --color-text-primary:#1C1C1C;--color-text-secondary:#555;--color-text-tertiary:#888;
  --color-background-primary:#fff;--color-background-secondary:#F5F3EE;
  --color-border-tertiary:rgba(0,0,0,0.12);
  --border-radius-md:8px;--border-radius-lg:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;color:var(--color-text-primary)}
svg text{font-family:system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
.th{font-size:14px;font-weight:500}
.ts{font-size:12px;font-weight:400}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
@media print{body{background:#fff!important;padding:0!important}}
</style>
</head>
<body style="background:var(--color-background-secondary);padding:2rem 1rem;min-height:100vh">
<h2 class="sr-only">Tech-Based Programs pipeline: referral and funnel feeds incubation, which feeds acceleration</h2>
<div style="max-width:700px;padding:0 4px;margin:0 auto">
  <div style="border-left:3px solid #4490D0;padding-left:16px;margin-bottom:24px;border-radius:0">
    <div style="font-size:12px;color:#1C4E6E;margin-bottom:6px">TechTown Detroit &#8212; Tech-Based Programs</div>
    <div style="font-size:24px;font-weight:500;color:var(--color-text-primary);line-height:1.2;margin-bottom:4px">Program Pipeline</div>

  <line x1="202" y1="170" x2="238" y2="237" stroke="#1B6B52" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="242" y="150" width="156" height="50" rx="8" fill="#E4EBE7" stroke="#1B6B52" stroke-width="0.5"/><text class="th" x="320" y="168" text-anchor="middle" dominant-baseline="central" fill="#0E4D3C">Build313</text><text class="ts" x="320" y="186" text-anchor="middle" dominant-baseline="central" fill="#1B6B52">Rapid Prototyping</text>

  <rect x="452" y="145" width="156" height="50" rx="8" fill="#FDF3C4" stroke="#C9A42C" stroke-width="0.5"/><text class="th" x="530" y="163" text-anchor="middle" dominant-baseline="central" fill="#0E4D3C">MAIN &amp; MedHealth</text><text class="ts" x="530" y="181" text-anchor="middle" dominant-baseline="central" fill="#1B6B52">Sector</text>

  <div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:16px;display:flex;justify-content:space-between">
    <div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">TechTown Detroit &#183; Tech-Based Programs</div>
    <div style="font-size:12px;color:var(--color-text-secondary)">techtown.org &#183; Detroit, MI</div>
  </div>
</div>
