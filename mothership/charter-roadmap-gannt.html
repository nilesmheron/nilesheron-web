<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mothership — Unified Timeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 32px; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; color: #1a1a1a; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
  .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 20px; }
  .filter-hint { font-size: 10px; color: #aaa; margin-left: 6px; letter-spacing: 0.04em; }
  .fb { padding: 4px 12px; border-radius: 14px; border: 1px solid; cursor: pointer; font-size: 11px; font-weight: 500; background: transparent; transition: background 0.15s, color 0.15s; font-family: inherit; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { font-size: 11px; font-weight: 500; padding: 8px 4px 10px; text-align: center; color: #888; border-bottom: 1px solid #e5e5e5; line-height: 1.4; }
  th.lh { text-align: left; padding-left: 12px; width: 34%; }
  th:not(.lh) { width: 13.2%; }
  td.lc { padding: 4px 8px 4px 22px; color: #1a1a1a; font-size: 12px; line-height: 1.3; position: relative; cursor: pointer; user-select: none; }
  td.lc .tw { display: inline-block; width: 10px; color: #bbb; font-size: 9px; margin-right: 6px; position: relative; top: -1px; transition: transform 0.15s; }
  tr.row.open td.lc .tw { transform: rotate(90deg); color: #666; }
  td.bc { padding: 2px 0; }
  .note { font-size: 10px; color: #999; display: block; margin-top: 2px; margin-left: 16px; }
  .bar { height: 16px; }
  .ph td { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; padding: 7px 8px 7px 10px; border-top: 1px solid #e5e5e5; border-left: 3px solid transparent; }
  .sl td { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; padding: 18px 10px 4px; color: #b5b5b5; }
  tbody tr.row:hover td { background: #fafafa; }
  tbody tr.ex td { padding: 0; background: #fafafa; border-left: 3px solid; }
  .ex-inner { padding: 10px 22px 14px 40px; font-size: 11px; line-height: 1.55; color: #333; }
  .ex-inner dl { display: grid; grid-template-columns: 110px 1fr; gap: 4px 14px; }
  .ex-inner dt { color: #888; font-weight: 500; text-transform: uppercase; font-size: 9px; letter-spacing: 0.08em; padding-top: 3px; }
  .ex-inner dd { color: #1a1a1a; }
  .ex-inner dd ul { margin-left: 14px; }
  .ex-inner dd li { margin-bottom: 2px; }
  .hidden { display: none; }
  @media print {
    body { padding: 16px; }
    .controls { display: none; }
    .ph td { border-top: 1px solid #ddd; }
    tr.ex { display: none; }
  }
</style>
</head>
<body>

const ALL = [...CHARTER, ...ROADMAP];
let sel = new Set();        // pillar IDs selected; empty = "All"
let openRows = new Set();   // row IDs currently expanded

function isPillarVisible(id){ return sel.size===0 || sel.has(id); }

function mkBar(color,a,i){
  if(!a[i]) return '<td class="bc"></td>';
  const s=i===0||!a[i-1], e=i===(COLS-1)||!a[i+1];
  const br=s&&e?'4px':s?'4px 0 0 4px':e?'0 4px 4px 0':'0';
  const ml=s?'3px':'0', mr=e?'3px':'0';
  return `<td class="bc"><div class="bar" style="background:${color};border-radius:${br};margin:0 ${mr} 0 ${ml};"></div></td>`;
}

function renderExpansion(x){
  if(!x||!x.length) return '<div class="ex-inner" style="color:#999;font-style:italic;">No additional detail.</div>';
  let h='<div class="ex-inner"><dl>';
  x.forEach(pair=>{
    h+=`<dt>${pair.k}</dt>`;
    if(Array.isArray(pair.v)){
      h+='<dd><ul>';
      pair.v.forEach(li=>h+=`<li>${li}</li>`);
      h+='</ul></dd>';
    } else {
      h+=`<dd>${pair.v}</dd>`;
    }
  });
  h+='</dl></div>';
  return h;
}

function renderGroup(group){
  let h='';
  group.forEach(p=>{
    const hide = !isPillarVisible(p.id) ? ' hidden' : '';
    h+=`<tr class="ph${hide}"><td colspan="${COLS+1}" style="background:${p.color}18;color:${p.tc};border-left-color:${p.color};">${p.label}</td></tr>`;
    p.items.forEach((it,idx)=>{
      const rid = `${p.id}-${idx}`;
      const open = openRows.has(rid);
      const caret = open ? '▾' : '▸';
      h+=`<tr class="row ${open?'open':''}${hide}" onclick="toggleRow('${rid}')"><td class="lc"><span class="tw">${caret}</span>${it.l}${it.n?`<span class="note">${it.n}</span>`:''}</td>`;
      for(let i=0;i<COLS;i++) h+=mkBar(p.color,it.a,i);
      h+=`</tr>`;
      // expansion row
      const exHidden = (!open || !!hide) ? ' hidden' : '';
      h+=`<tr class="ex${exHidden}"><td colspan="${COLS+1}" style="border-left-color:${p.color};">${renderExpansion(it.x)}</td></tr>`;
    });
  });
  return h;
}

function render(){
  const showCharter = CHARTER.some(p=>isPillarVisible(p.id));
  const showRoadmap = ROADMAP.some(p=>isPillarVisible(p.id));
  let h='';
  h += `<tr class="sl${showCharter?'':' hidden'}"><td colspan="${COLS+1}">Real estate delivery</td></tr>`;
  h += renderGroup(CHARTER);
  h += `<tr class="sl${showRoadmap?'':' hidden'}"><td colspan="${COLS+1}">Strategic roadmap</td></tr>`;
  h += renderGroup(ROADMAP);
  document.getElementById('gb').innerHTML=h;
}

function toggleRow(rid){
  if(openRows.has(rid)) openRows.delete(rid);
  else openRows.add(rid);
  render();
}

function buildF(){
  let h=`<button class="fb" id="f-all" onclick="setF('all')" style="color:#666;border-color:#ccc;">All</button>`;
  ALL.forEach(p=>{
    h+=`<button class="fb" id="f-${p.id}" onclick="setF('${p.id}')" style="color:${p.tc};border-color:${p.color};">${p.label}</button>`;
  });
  h+=`<span class="filter-hint">click multiple to combine · click again to remove</span>`;
  document.getElementById('controls').innerHTML=h;
  styleActive();
}

function styleActive(){
  document.querySelectorAll('.fb').forEach(b=>{
    const id=b.id.replace('f-','');
    const p=ALL.find(x=>x.id===id);
    let active = false;
    if(id==='all') active = (sel.size===0);
    else active = sel.has(id);
    if(active){
      b.style.background=p?p.color:'#888';
      b.style.color='white';
      b.style.borderColor=p?p.color:'#888';
    } else {
      b.style.background='transparent';
      if(p){b.style.color=p.tc;b.style.borderColor=p.color;}
      else{b.style.color='#666';b.style.borderColor='#ccc';}
    }
  });
}

function setF(id){
  if(id==='all'){
    sel.clear();
  } else {
    if(sel.has(id)) sel.delete(id);
    else sel.add(id);
  }
  styleActive();
  render();
}

buildF();render();
</script>

</html>
