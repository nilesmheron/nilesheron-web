<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal AI OS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f0f0f; --surface: #1a1a1a; --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2); --text: #f0f0f0; --text-muted: #888; --text-dim: #555; --user-bg: #1e1e1e; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .wordmark { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .progress-wrap { width: 80px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--text-muted); border-radius: 2px; transition: width 0.5s ease; width: 3%; }
  main { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; }
  #messages { max-width: 640px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; padding-bottom: 1rem; }
  .msg { max-width: 82%; padding: 11px 15px; border-radius: 16px; font-size: 15px; line-height: 1.65; }
  .msg.ai { align-self: flex-start; background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; }
  .msg.user { align-self: flex-end; background: var(--user-bg); border: 0.5px solid var(--border-strong); color: var(--text); border-bottom-right-radius: 4px; }
  .msg.note { align-self: center; background: none; font-size: 12px; color: var(--text-dim); padding: 2px 0; max-width: 100%; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: bounce 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.18s; } .dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  footer { flex-shrink: 0; border-top: 0.5px solid var(--border); padding: 1rem 1.5rem; }
  .input-row { max-width: 640px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: 12px; color: var(--text); font-size: 15px; font-family: inherit; line-height: 1.5; padding: 10px 14px; resize: none; min-height: 44px; max-height: 160px; overflow-y: auto; }
  textarea:focus { outline: none; border-color: rgba(255,255,255,0.35); }
  textarea::placeholder { color: var(--text-dim); }
  textarea:disabled { opacity: 0.4; }
  button#send { background: var(--text); color: var(--bg); border: none; border-radius: 10px; padding: 10px 18px; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; flex-shrink: 0; height: 44px; transition: opacity 0.15s; }
  button#send:disabled { opacity: 0.3; cursor: default; }
  button#send:hover:not(:disabled) { opacity: 0.85; }
  #assessment { display: none; max-width: 640px; width: 100%; margin: 0 auto; padding-bottom: 2rem; }
  .bp-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.25rem; }
  .bp-label { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .bp-name { font-size: 12px; color: var(--text-dim); }
  .bp-divider { height: 0.5px; background: var(--border); margin-bottom: 1.25rem; }
  .bp-section-head { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin: 22px 0 7px; }
  .bp-section-head:first-child { margin-top: 0; }
  .bp-body p { margin: 0 0 8px; line-height: 1.7; color: var(--text); font-size: 15px; }
  .restart-btn { margin-top: 2rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); }
  .restart-btn button { background: transparent; border: 0.5px solid var(--border-strong); border-radius: 8px; color: var(--text-muted); font-size: 13px; font-family: inherit; padding: 8px 18px; cursor: pointer; }
  .restart-btn button:hover { background: var(--surface); }
</style>
</head>
<body>
<header>
  <span class="wordmark">Personal AI OS</span>
  <div class="progress-wrap"><div class="progress-fill" id="pbar"></div></div>
</header>
<main id="main">
  <div id="messages"></div>
  <div id="assessment"></div>
</main>
<footer id="footer">
  <div class="input-row">
    <textarea id="input" placeholder="Type your response..." rows="1"></textarea>
    <button id="send" disabled>Send</button>
  </div>
</footer>
<script>
var INTAKE_SYS = "You are a warm, curious intake assistant. Your purpose — which you state clearly at the start — is to help this person understand what AI could be doing for them, and give them a real plan for how to get there. You are building toward an honest assessment: what they currently use, what already exists that could help them, and what could be built for them specifically.\n\nMove through four phases naturally. Keep responses short. One or two questions at a time, never three. Do not over-explain. Do not stay in any phase longer than needed.\n\nPHASE 1 - WHO THEY ARE (2-3 exchanges)\nLearn what they do and who they do it for. Probe once if the answer is thin, then move on. You need enough to understand their context, not their life story.\n\nPHASE 2 - THEIR CURRENT SYSTEMS (3-4 exchanges)\nThis is the diagnostic core. After you understand who they are, shift to how they actually manage their work and life right now. Ask what tools and systems they use - email, task management, calendar, communication, note-taking, anything. Ask where those systems are breaking down or costing them the most time and energy. Be specific. This is the most important phase - you need a real picture of their current setup to produce a useful assessment.\n- What does your current setup look like for managing your work?\n- Where does stuff fall through the cracks most often?\n- What tool or process frustrates you most right now?\n\nPHASE 2B - THE AI BARRIER (1-2 exchanges)\nAsk directly why they are not doing more with AI tools already. Frame it as a genuine question, not an accusation. The answer is almost always trust or capacity - they either don't believe it will help them specifically, or they don't have the time or knowledge to figure it out. This answer directly shapes the recommendations.\n- Is it more that you haven't had time to figure it out, or that you're not sure it would actually help?\n- What would need to be true for you to feel confident using AI as part of how you work?\n\nTRUST CHECKPOINT\nMirror back what you've learned in 3-4 tight sentences covering who they are, their current setup, where it's breaking down, and what's held them back from AI. Ask if it lands. Move on as soon as they confirm.\n\nPHASE 3 - THE AMBITION (1-2 exchanges)\nOnly after trust checkpoint confirmed. One question: what does their work life look like if this actually gets solved? What's the version of their day they're trying to get to? That's all you need. Then trigger.\n\nWHEN READY\nThe moment you have all four phases complete and trust checkpoint confirmed, end your message with this marker on its own line:\n[ASSESSMENT_READY]\n\nSTYLE: Warm, direct, not effusive. Never say Great! or That's fascinating! Short responses only. Prose, no bullets. Mirror before probing. Lowercase is fine. Move on when you have what you need - do not keep exploring.";

var ASSESSMENT_SYS = "You are generating a personalized AI systems assessment based on a completed intake conversation. Your job is to be genuinely useful - not to sell AI, but to give an honest read of where this person is, what already exists that could help them, and what a bespoke build would look like.\n\nUse exactly these five sections. Format each header as **SECTION NAME** on its own line with nothing else on that line.\n\n**WHERE YOU ARE NOW**\nAn honest, specific read of their current setup based on what they shared. Name the actual tools and systems they mentioned. Identify the real gaps - not generic productivity problems, but the specific ways their current setup is failing them.\n\n**WHAT ALREADY EXISTS THAT COULD HELP**\nSpecific existing tools or platforms that address their actual gaps. For each one, say what it does, why it fits their situation, and what the honest trade-off is. Do not list every AI tool - only the ones genuinely relevant to what they shared. Be direct about limitations.\n\n**WHAT A BESPOKE BUILD COULD LOOK LIKE**\nBased on their situation, describe what a custom-built solution would look like - the components, what it would automate or connect, and roughly what effort level we're talking about. Be honest about whether this is worth it given what already exists, or whether it fills a gap that off-the-shelf tools can't.\n\n**YOUR FIRST MOVE**\nOne specific thing to do first - either try a specific existing tool or build one specific thing. Concrete enough to start this week. Explain why this one before anything else, especially in light of what's held them back from AI so far.\n\n**IF YOU BUILD THIS OUT**\nOne paragraph. If they systematically close the gaps you've identified, what does their work life actually look like? Grounded and specific to what they shared - not a generic productivity pitch.\n\nWrite like a trusted advisor who actually listened. Direct, no corporate language, no AI cheerleading.";

var OPENER = "hey - glad you're here. quick thing before we start: i'm going to ask you some questions about how you work and what you're dealing with, and at the end i'll give you an honest assessment of what AI could actually be doing for you - what tools exist, what could be built for you specifically, and where to start. it only works if you're honest with me, so don't worry about sounding polished.\n\nfirst question: what do you do?";

var PRIMING = [
  { role: "user", content: INTAKE_SYS + "\n\nBegin the conversation now with the opener." },
  { role: "assistant", content: OPENER }
];

var convo = [], exchanges = 0, busy = false, done = false;
var msgsEl = document.getElementById("messages");
var inputEl = document.getElementById("input");
var sendBtn = document.getElementById("send");
var pbar = document.getElementById("pbar");

function scroll() { setTimeout(function() { var m = document.getElementById("main"); m.scrollTop = m.scrollHeight; }, 60); }
function addMsg(role, text) { var d = document.createElement("div"); d.className = "msg " + role; d.textContent = text; msgsEl.appendChild(d); scroll(); }
function addNote(text) { var d = document.createElement("div"); d.className = "msg note"; d.textContent = text; msgsEl.appendChild(d); scroll(); }
function showTyping() { var d = document.createElement("div"); d.className = "msg ai typing"; d.id = "typing"; d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>'; msgsEl.appendChild(d); scroll(); }
function hideTyping() { var t = document.getElementById("typing"); if (t) t.remove(); }
function setProgress(p) { pbar.style.width = p + "%"; }
function lock() { busy = true; inputEl.disabled = true; sendBtn.disabled = true; }
function unlock() { busy = false; inputEl.disabled = false; sendBtn.disabled = !inputEl.value.trim(); inputEl.focus(); }

function callAPI(body) {
  return fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  }).then(function(res) {
    return res.json();
  }).then(function(data) {
    if (data.error) throw new Error(data.error.message || data.error);
    return (data.content || []).map(function(b) { return b.text || ""; }).join("");
  });
}

function handleMessage(userMsg) {
  if (busy || done) return;
  lock();
  convo.push({ role: "user", content: userMsg });
  showTyping();
  var msgs = PRIMING.concat(convo);
  callAPI({ model: "claude-haiku-4-5-20251001", max_tokens: 400, messages: msgs })
    .then(function(text) {
      var ready = text.indexOf("[ASSESSMENT_READY]") !== -1;
      text = text.replace(/\[ASSESSMENT_READY\]/g, "").trim();
      convo.push({ role: "assistant", content: text });
      hideTyping();
      addMsg("ai", text);
      exchanges++;
      setProgress(Math.min(82, 4 + exchanges * 8));
      if (ready) { done = true; setTimeout(function() { generateAssessment(); }, 700); }
      else unlock();
    })
    .catch(function(e) {
      hideTyping();
      convo.pop();
      addMsg("ai", "something went wrong - " + e.message + ". try again.");
      unlock();
    });
}

function generateAssessment() {
  setProgress(88);
  addNote("building your assessment...");
  showTyping();
  var transcript = convo.map(function(m) {
    return (m.role === "user" ? "Person" : "Interviewer") + ": " + m.content;
  }).join("\n\n");
  callAPI({
    model: "claude-sonnet-4-6",
    max_tokens: 1400,
    messages: [{ role: "user", content: ASSESSMENT_SYS + "\n\nFull conversation:\n\n" + transcript + "\n\nGenerate the assessment." }]
  }).then(function(text) {
    hideTyping();
    setProgress(100);
    showAssessment(text);
  }).catch(function(e) {
    hideTyping();
    addMsg("ai", "assessment generation failed: " + e.message);
  });
}

function parseSections(text) {
  var lines = text.split("\n"), out = [], cur = null;
  for (var i = 0; i < lines.length; i++) {
    var m = lines[i].match(/^\*\*([^*]+)\*\*\s*$/);
    if (m) { if (cur) out.push(cur); cur = { h: m[1], b: [] }; }
    else if (cur) cur.b.push(lines[i]);
  }
  if (cur) out.push(cur);
  return out.length ? out : [{ h: "Your Assessment", b: lines }];
}

function showAssessment(text) {
  document.getElementById("messages").style.display = "none";
  document.getElementById("footer").style.display = "none";
  var el = document.getElementById("assessment");
  el.style.display = "block";
  var firstMsg = null;
  for (var i = 0; i < convo.length; i++) { if (convo[i].role === "user") { firstMsg = convo[i]; break; } }
  var nameMatch = firstMsg ? firstMsg.content.match(/\b([A-Z][a-z]{2,12})\b/) : null;
  var firstName = nameMatch ? nameMatch[1] : "";
  var sections = parseSections(text);
  var html = '<div class="bp-meta"><span class="bp-label">Your AI Assessment</span><span class="bp-name">' + firstName + '</span></div><div class="bp-divider"></div>';
  for (var j = 0; j < sections.length; j++) {
    html += '<div class="bp-section-head"' + (j === 0 ? ' style="margin-top:0"' : '') + '>' + sections[j].h + '</div><div class="bp-body">';
    var body = sections[j].b.filter(function(l) { return l.trim(); });
    for (var k = 0; k < body.length; k++) { html += '<p>' + body[k] + '</p>'; }
    html += '</div>';
  }
  html += '<div class="restart-btn"><button onclick="location.reload()">Start over</button></div>';
  el.innerHTML = html;
  document.getElementById("main").scrollTop = 0;
}

inputEl.addEventListener("input", function() {
  sendBtn.disabled = busy || !inputEl.value.trim();
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
});

inputEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey && !busy) {
    e.preventDefault();
    var val = inputEl.value.trim();
    if (!val) return;
    addMsg("user", val);
    inputEl.value = "";
    inputEl.style.height = "auto";
    handleMessage(val);
  }
});

sendBtn.addEventListener("click", function() {
  var val = inputEl.value.trim();
  if (!val || busy) return;
  addMsg("user", val);
  inputEl.value = "";
  inputEl.style.height = "auto";
  handleMessage(val);
});

addMsg("ai", OPENER);
inputEl.focus();
</script>
</body>
</html>
