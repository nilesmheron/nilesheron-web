<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assessment Report — Personal AI OS</title>
<style>
  body { font-family: Georgia, serif; max-width: 680px; margin: 60px auto; padding: 0 24px 80px; color: #1a1a1a; background: #fafafa; }
  h1 { font-size: 1.4rem; font-weight: normal; margin-bottom: 4px; }
  .meta { color: #999; font-size: 0.85rem; margin-bottom: 40px; }
  .meta a { color: #999; }
  h2 { font-size: 0.78rem; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; color: #999; margin: 36px 0 8px; padding-bottom: 8px; border-bottom: 1px solid #e8e8e8; }
  h2:first-of-type { margin-top: 0; }
  p { color: #333; line-height: 1.8; margin: 0 0 14px; font-size: 1rem; }
  hr { border: none; border-top: 1px solid #e8e8e8; margin: 40px 0; }
  .card { border: 1px solid #e0e0e0; border-radius: 6px; padding: 20px 24px; margin-bottom: 16px; background: #fff; }
  .card-title { font-size: 0.95rem; font-weight: bold; margin: 0 0 6px; font-family: Georgia, serif; }
  .card-desc { font-size: 0.88rem; color: #666; line-height: 1.6; margin: 0 0 14px; }
  .card-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .btn { display: inline-block; padding: 8px 18px; font-size: 0.85rem; font-family: Georgia, serif; border-radius: 4px; text-decoration: none; cursor: pointer; border: 1px solid #1a1a1a; background: #1a1a1a; color: #fff; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.82; }
  .btn-outline { background: transparent; color: #1a1a1a; }
  .btn-outline:hover { background: #f0f0f0; opacity: 1; }
  .btn-success { background: #2d6a2d; border-color: #2d6a2d; }
  .share-url { font-size: 0.8rem; color: #999; margin-top: 8px; word-break: break-all; }
  .disclaimer { font-size: 0.82rem; color: #999; line-height: 1.6; padding: 14px 18px; background: #f4f4f4; border-radius: 4px; border-left: 3px solid #ddd; margin-bottom: 32px; }
  #loading { color: #999; font-style: italic; }
  #error { color: #c0392b; }
  .footer-nav { font-size: 0.82rem; color: #999; margin-top: 48px; }
  .footer-nav a { color: #999; }
</style>
</head>
<body>

<h1 id="report-title">AI Assessment Report</h1>
<p class="meta" id="report-meta"><a href="/sandbox/personal-ai-os">← Personal AI OS</a></p>

<div id="loading">Loading your report...</div>
<div id="error" style="display:none"></div>
<div id="report-body" style="display:none"></div>

<script>
var reportId = new URLSearchParams(window.location.search).get('id');
var reportData = null;

if (!reportId) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = 'No report ID found. Go back and use the Save / Share report button to generate a link.';
} else {
  fetch('/api/report?id=' + encodeURIComponent(reportId))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      reportData = data;
      renderReport(data);
    })
    .catch(function(e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'Could not load report: ' + e.message;
    });
}

function renderReport(data) {
  var name = data.name || '';
  var date = new Date(data.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  if (name) document.title = 'AI Assessment — ' + name + ' | Personal AI OS';
  document.getElementById('report-title').textContent = name ? 'AI Assessment — ' + name : 'AI Assessment Report';
  document.getElementById('report-meta').innerHTML = '<a href="/sandbox/personal-ai-os">← Personal AI OS</a> &nbsp;·&nbsp; Generated ' + date;

  document.getElementById('loading').style.display = 'none';
  var body = document.getElementById('report-body');
  body.style.display = 'block';

  var shareUrl = window.location.href;

  body.innerHTML =
    '<div class="card">' +
    '<p class="card-title">Save / Share this report</p>' +
    '<p class="card-desc">Copy the link to share with anyone, or download the .md file to upload into Claude or any AI assistant.</p>' +
    '<div class="card-actions">' +
    '<button class="btn" id="copy-link-btn" onclick="copyLink()">Copy link</button>' +
    '<button class="btn btn-outline" onclick="downloadMd()">Download .md</button>' +
    '</div>' +
    '<p class="share-url" id="share-url-display">' + shareUrl + '</p>' +
    '</div>' +
    '<div class="disclaimer">This assessment was generated by <a href="/sandbox/personal-ai-os">Personal AI OS</a>. The .md file is formatted for Claude but any LLM should be able to parse it. To use it: upload the file to a Claude Project, or paste its contents into any AI conversation and ask for help implementing the recommendations.</div>' +
    '<div id="sections">' + renderSections(data.assessment) + '</div>' +
    '<p class="footer-nav"><a href="/sandbox/personal-ai-os">← Get your own assessment</a></p>';
}

function renderSections(text) {
  var lines = text.split('\n');
  var html = '';
  var inSection = false;
  for (var i = 0; i < lines.length; i++) {
    var m = lines[i].match(/^\*\*([^*]+)\*\*\s*$/);
    if (m) {
      html += '<h2>' + escHtml(m[1]) + '</h2>';
      inSection = true;
    } else if (lines[i].trim() && inSection) {
      html += '<p>' + escHtml(lines[i]) + '</p>';
    }
  }
  return html || '<p>' + escHtml(text) + '</p>';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyLink() {
  var btn = document.getElementById('copy-link-btn');
  navigator.clipboard.writeText(window.location.href).then(function() {
    btn.textContent = 'Copied!';
    btn.classList.add('btn-success');
    setTimeout(function() { btn.textContent = 'Copy link'; btn.classList.remove('btn-success'); }, 2500);
  }).catch(function() {
    var url = document.getElementById('share-url-display');
    url.style.background = '#fffde7';
    url.style.padding = '6px 8px';
    url.title = 'Copy this URL';
  });
}

function buildMd() {
  if (!reportData) return '';
  var name = reportData.name || '';
  var date = new Date(reportData.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  var lines = [];
  lines.push('# Personal AI OS — Assessment Report');
  if (name) lines.push('**Name:** ' + name);
  lines.push('**Generated:** ' + date);
  lines.push('**Source:** ' + window.location.href);
  lines.push('');
  lines.push('---');
  lines.push('');
  lines.push('## How to use this file');
  lines.push('');
  lines.push('This assessment was written for Claude but any LLM should be able to parse it.');
  lines.push('');
  lines.push('**To use with Claude:** Upload this file to a Claude Project, or paste its contents into a conversation. Then ask: *"Help me implement the recommendations in this assessment, starting with the first move."*');
  lines.push('');
  lines.push('**To use with any other LLM:** Paste the contents into a new conversation and ask the same thing. The structure is plain markdown and works with ChatGPT, Gemini, or any other assistant.');
  lines.push('');
  lines.push('---');
  lines.push('');
  var assessment = reportData.assessment || '';
  var cleanedLines = assessment.split('\n');
  for (var i = 0; i < cleanedLines.length; i++) {
    var m = cleanedLines[i].match(/^\*\*([^*]+)\*\*\s*$/);
    if (m) {
      lines.push('## ' + m[1]);
      lines.push('');
    } else if (cleanedLines[i].trim()) {
      lines.push(cleanedLines[i]);
      lines.push('');
    }
  }
  lines.push('---');
  lines.push('');
  lines.push('*Generated by Personal AI OS — dev.nilesheron.com/sandbox/personal-ai-os*');
  return lines.join('\n');
}

function downloadMd() {
  var content = buildMd();
  var name = (reportData && reportData.name) ? reportData.name.toLowerCase().replace(/[^a-z0-9]+/g, '-') : 'assessment';
  var filename = 'ai-assessment-' + name + '.md';
  var blob = new Blob([content], { type: 'text/markdown' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
